services:
  - type: web
    name: bookhub
    runtime: docker
    plan: free
    region: frankfurt
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/
    preDeployCommand: python manage.py migrate --noinput
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bookhub-db
          property: connectionString
      - key: DEFAULT_FROM_EMAIL
        value: noreply@bookhub.onrender.com

databases:
  - name: bookhub-db
    databaseName: bookhub
    user: bookhub
    plan: free
